name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Backend tests
        working-directory: backend
        run: mvn test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend install
        working-directory: frontend
        run: npm install

      - name: Frontend build
        working-directory: frontend
        run: npm run build

  docker:
    needs: build-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t blog-backend:latest ./backend

      - name: Build frontend image
        run: docker build -t blog-frontend:latest ./frontend

      - name: Push images
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        run: |
          docker tag blog-backend:latest ${{ secrets.DOCKERHUB_USERNAME }}/blog-backend:latest
          docker tag blog-frontend:latest ${{ secrets.DOCKERHUB_USERNAME }}/blog-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/blog-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/blog-frontend:latest

      - name: Deploy over SSH
        if: ${{ secrets.DEPLOY_HOST != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose pull
            docker compose up -d
