services:
  postgres:
    image: postgres:16-alpine
    container_name: blog-postgres
    environment:
      POSTGRES_DB: blogdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Nivi-1627
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blogdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: blog-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5000
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/blogdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Nivi-1627
      ACCESS_TOKEN_SECRET: blog_access_secret_super_secure_key_32chars
      ACCESS_TOKEN_EXPIRATION_MS: 900000
      CLIENT_URL: http://localhost:5173
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: blog-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
